# Rate limiting zones for brute force protection
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;

server {
    listen 443 ssl;
    http2 on;
    server_name video-annotator.jllevine.people.aws.dev;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/video-annotator.jllevine.people.aws.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/video-annotator.jllevine.people.aws.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Basic authentication
    auth_basic "Video Annotator - Amazon Internal";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Large file upload support (2GB)
    client_max_body_size 2048M;
    client_body_timeout 300s;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-User $remote_user;
    proxy_cache_bypass $http_upgrade;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Serve React app
    location / {
        limit_req zone=general_limit burst=20 nodelay;
        limit_req zone=login_limit burst=5;
        limit_req_status 429;

        root /home/ec2-user/dist;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests
    location /api/ {
        limit_req zone=general_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3002;
    }

    # Proxy Socket.IO
    location /socket.io/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Serve uploaded videos
    location /uploads/ {
        proxy_pass http://localhost:3002;
    }
}
