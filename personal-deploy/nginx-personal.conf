# Nginx config for personal deployment
# Domain: annotator.perfectpixels.com

# Rate limiting
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;

server {
    listen 80;
    server_name annotator.perfectpixels.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name annotator.perfectpixels.com;

    # SSL (Let's Encrypt — certbot will fill these in)
    ssl_certificate /etc/letsencrypt/live/annotator.perfectpixels.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/annotator.perfectpixels.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Large file upload support (2GB)
    client_max_body_size 2048M;
    client_body_timeout 300s;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Serve React app
    location / {
        limit_req zone=general_limit burst=20 nodelay;
        root /home/ec2-user/video-annotator/dist;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests
    location /api/ {
        limit_req zone=general_limit burst=20 nodelay;
        proxy_pass http://localhost:3002;
    }

    # Proxy Socket.IO
    location /socket.io/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Serve uploaded videos (local fallback)
    location /uploads/ {
        proxy_pass http://localhost:3002;
    }
}
